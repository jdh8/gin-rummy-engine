<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gin Rummy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Gin Rummy</h1>
    <div id="score" class="score"></div>
    <select id="difficulty" class="difficulty" title="Bot strength (new game)">
      <option value="newbie">Easy</option>
      <option value="greedy">Medium</option>
      <option value="mc:128" selected>Hard</option>
    </select>
    <button id="sort" class="sort" title="Reorder loose cards (v)"></button>
  </header>
  <main>
    <section id="opp" class="opp"></section>
    <section class="table">
      <div id="deck" class="stack"></div>
      <div id="discard" class="stack"></div>
    </section>
    <section id="hand" class="hand"></section>
    <div id="actions" class="actions"></div>
  </main>
  <aside id="log" class="log"></aside>
  <script type="module" src="app.js"></script>
</body>
</html>
